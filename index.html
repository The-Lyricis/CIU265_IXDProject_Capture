<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Citizen Lens Capture</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <section class="camera-section">
                <div class="viewfinder-container">
                    <video id="video" autoplay muted playsinline></video>
                    <img id="overlay-img" class="overlay-img" alt="">
                    <img id="freeze-img" class="freeze-img" alt="">
                    <div class="shutter-overlay" id="shutter-overlay"></div>
                </div>
                <div class="capture-status" id="capture-status">Awaiting photo shoot</div>
                <div class="news-picker">
                    <span class="news-picker-title">Choose today&apos;s news</span>
                    <div class="news-selector">
                        <button class="news-arrow" id="news-prev" type="button" aria-label="Previous">&larr;</button>
                        <div class="news-current" id="news-current">test news 1</div>
                        <button class="news-arrow" id="news-next" type="button" aria-label="Next">&rarr;</button>
                    </div>
                    <p class="news-hint">Press camera button<br>create today&apos;s headline!</p>
                </div>
            </section>
            <section class="wall-section">
                <h2 class="wall-title">VOTE FOR TODAY&apos;S BEST NEWS</h2>
                <div class="photo-wall" id="photo-wall">
                    <div class="photo-cell best-cell" data-position="0">
                        <span class="best-label">BEST</span>
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="1">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="2">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="3">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="4">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="5">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="6">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="7">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                    <div class="photo-cell" data-position="8">
                        <div class="photo-slot"></div>
                        <div class="vote-row">
                            <button class="vote-btn" type="button">VOTE</button>
                            <span class="vote-count">0</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <div id="toast" class="toast" role="status" aria-live="polite"></div>
        <canvas id="canvas" style="display:none;"></canvas>
        <script type="module" src="script.js"></script>
    </body>
</html>
